<div class="w-full max-w-sm rounded-xl border border-slate-200 bg-white p-8 shadow-md">
  <h1 class="text-2xl font-semibold text-[#3758F9]">
    {{ 'FORGOT_PASSWORD.TITLE' | translate }}
  </h1>

  <p class="mt-3 text-sm font-semibold text-slate-700">
    {{ 'FORGOT_PASSWORD.CODE_TITLE' | translate }}
  </p>

  <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()">
    <input
      type="text"
      formControlName="code"
      class="w-full rounded-full border border-slate-200 bg-white px-5 py-3 text-center text-sm tracking-[0.35em] outline-none placeholder:text-slate-400 focus:border-[#3758F9] focus:ring-2 focus:ring-[#3758F9]/20"
      [placeholder]="'FORGOT_PASSWORD.CODE_PLACEHOLDER' | translate"
      [attr.aria-label]="'FORGOT_PASSWORD.CODE_LABEL' | translate"
    />

    <p *ngIf="codeControl.invalid && (codeControl.dirty || codeControl.touched)"
       class="text-xs text-red-600">
      {{ 'FORGOT_PASSWORD.CODE_ERROR' | translate }}
    </p>

    <p class="pt-1 text-center text-xs text-slate-400">
      {{ 'FORGOT_PASSWORD.CODE_HELP' | translate }}
    </p>

    <button
      type="submit"
      class="mt-2 w-full rounded-full bg-[#3758F9] py-3 text-sm font-semibold text-white hover:bg-[#2F4FE1] disabled:opacity-60"
      [disabled]="form.invalid || isSubmitting"
    >
      {{ 'FORGOT_PASSWORD.CODE_BUTTON' | translate }}
    </button>

    <button
      type="button"
      class="w-full rounded-full border border-[#3758F9] py-3 text-sm font-semibold text-[#3758F9] hover:bg-blue-50"
      (click)="onBack()"
      [disabled]="isSubmitting"
    >
      &lt; {{ 'FORGOT_PASSWORD.BACK' | translate }}
    </button>
  </form>
</div>
