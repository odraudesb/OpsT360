<div class="w-full max-w-sm rounded-xl border border-slate-200 bg-white p-8 shadow-md">
  <h1 class="text-2xl font-semibold text-[#3758F9]">
    {{ 'FORGOT_PASSWORD.NEW_TITLE' | translate }}
  </h1>

  <p class="mt-3 text-sm text-slate-600">
    {{ 'FORGOT_PASSWORD.NEW_SUBTITLE' | translate }}
  </p>

  <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="relative">
      <input
        [type]="showPassword ? 'text' : 'password'"
        formControlName="password"
        class="w-full rounded-full border border-slate-200 bg-white px-5 py-3 pr-12 text-sm outline-none placeholder:text-slate-400 focus:border-[#3758F9] focus:ring-2 focus:ring-[#3758F9]/20"
        [placeholder]="'FORGOT_PASSWORD.NEW_PLACEHOLDER' | translate"
        [attr.aria-label]="'FORGOT_PASSWORD.NEW_LABEL' | translate"
      />
      <button
        type="button"
        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
        (click)="togglePassword()"
        [attr.aria-label]="'FORGOT_PASSWORD.TOGGLE_PASSWORD' | translate"
      >
        <svg *ngIf="!showPassword" aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5" fill="none"
          stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <svg *ngIf="showPassword" aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5" fill="none"
          stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 3l18 18M10.477 10.48a3 3 0 004.243 4.243M6.228 6.228C4.645 7.511 3.449 9.22 2.458 12c1.274 4.057 5.065 7 9.542 7 1.57 0 3.06-.322 4.41-.897M9.88 4.24A9.96 9.96 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.034 10.034 0 01-4.1 5.289" />
        </svg>
      </button>
    </div>

    <p class="text-xs text-slate-500">
      {{ 'FORGOT_PASSWORD.PASSWORD_HELP' | translate }}
    </p>

    <div class="relative">
      <input
        [type]="showConfirmPassword ? 'text' : 'password'"
        formControlName="confirmPassword"
        class="w-full rounded-full border border-slate-200 bg-white px-5 py-3 pr-12 text-sm outline-none placeholder:text-slate-400 focus:border-[#3758F9] focus:ring-2 focus:ring-[#3758F9]/20"
        [placeholder]="'FORGOT_PASSWORD.CONFIRM_PLACEHOLDER' | translate"
        [attr.aria-label]="'FORGOT_PASSWORD.CONFIRM_LABEL' | translate"
      />
      <button
        type="button"
        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
        (click)="toggleConfirmPassword()"
        [attr.aria-label]="'FORGOT_PASSWORD.TOGGLE_PASSWORD' | translate"
      >
        <svg *ngIf="!showConfirmPassword" aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5" fill="none"
          stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <svg *ngIf="showConfirmPassword" aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5" fill="none"
          stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 3l18 18M10.477 10.48a3 3 0 004.243 4.243M6.228 6.228C4.645 7.511 3.449 9.22 2.458 12c1.274 4.057 5.065 7 9.542 7 1.57 0 3.06-.322 4.41-.897M9.88 4.24A9.96 9.96 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.034 10.034 0 01-4.1 5.289" />
        </svg>
      </button>
    </div>

    <p *ngIf="passwordMismatch" class="text-xs text-red-600">
      {{ 'FORGOT_PASSWORD.MISMATCH' | translate }}
    </p>

    <button
      type="submit"
      class="mt-2 w-full rounded-full bg-[#3758F9] py-3 text-sm font-semibold text-white hover:bg-[#2F4FE1] disabled:opacity-60"
      [disabled]="form.invalid || isSubmitting"
    >
      {{ 'FORGOT_PASSWORD.NEW_BUTTON' | translate }}
    </button>

    <button
      type="button"
      class="w-full rounded-full border border-[#3758F9] py-3 text-sm font-semibold text-[#3758F9] hover:bg-blue-50"
      (click)="onBack()"
      [disabled]="isSubmitting"
    >
      &lt; {{ 'FORGOT_PASSWORD.BACK' | translate }}
    </button>
  </form>
</div>
