<div class="min-h-screen bg-slate-50 text-slate-900">
  <t360-header
    sectionLabel="Subscriptions"
    sectionLink=""
    [disableSectionLink]="true"
    [showNotificationDot]="false"></t360-header>

  <main class="px-4 pb-6 pt-0 -mt-px">
    <section class="rounded-lg border border-slate-200 bg-white shadow-sm">
      <div class="px-5 py-4">
        <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
          <div class="w-full max-w-md space-y-3">
            <div class="space-y-2">
              <label class="text-[11px] font-semibold text-slate-500">Customer Name</label>
              <input
                type="text"
                [(ngModel)]="customerName"
                class="w-full rounded-md border border-slate-200 bg-white px-3 py-1.5 text-xs shadow-sm focus:border-slate-300 focus:outline-none"
              />
            </div>
            <div class="space-y-2">
              <label class="text-[11px] font-semibold text-slate-500">Id Customer</label>
              <input
                type="text"
                [(ngModel)]="customerId"
                class="w-full rounded-md border border-slate-200 bg-white px-3 py-1.5 text-xs shadow-sm focus:border-slate-300 focus:outline-none"
              />
            </div>
            <div class="space-y-2">
              <label class="text-[11px] font-semibold text-slate-500">Suscription Status</label>
              <span
                class="inline-flex items-center rounded-full bg-red-50 px-3 py-0.5 text-[11px] font-semibold text-red-500"
                >Unsubscribe</span
              >
            </div>
          </div>

          <div class="flex w-full max-w-md items-center justify-between gap-3 rounded-full border border-slate-200 bg-white px-4 py-1.5 text-xs text-slate-500 shadow-sm">
            <span class="text-sm text-slate-400">☰</span>
            <input
              type="search"
              placeholder="Search Customer"
              class="w-full bg-transparent text-[11px] text-slate-700 placeholder:text-slate-400 focus:outline-none"
            />
            <span class="flex h-7 w-7 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-500">
              <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M10.5 3a7.5 7.5 0 1 0 0 15a7.5 7.5 0 0 0 0-15Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M16.5 16.5L21 21"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
          </div>
        </div>

        <div class="mt-5">
          <h2 class="text-sm font-semibold text-slate-500">Export Services</h2>
          <div class="mt-2.5 grid gap-2.5 md:grid-cols-2 xl:grid-cols-4">
            <article
              *ngFor="let service of exportServices; trackBy: trackByServiceId"
              class="flex h-full flex-col rounded-md border border-slate-200 bg-white p-2.5 shadow-sm"
            >
              <div class="flex items-start justify-between gap-2">
                <h3 class="text-[11px] font-semibold text-slate-700">{{ service.name }}</h3>
                <span class="text-[11px] font-semibold text-[#3758F9]">{{ service.price }}</span>
              </div>
              <p class="mt-2 text-[10px] leading-4 text-slate-400">{{ service.description }}</p>
            </article>
          </div>
        </div>

        <div class="mt-5">
          <h2 class="text-sm font-semibold text-slate-500">Import Services</h2>
          <div class="mt-2.5 grid gap-2.5 md:grid-cols-2 xl:grid-cols-4">
            <article
              *ngFor="let service of importServices; trackBy: trackByServiceId"
              class="flex h-full flex-col rounded-md border border-slate-200 bg-white p-2.5 shadow-sm"
            >
              <div class="flex items-start justify-between gap-2">
                <h3 class="text-[11px] font-semibold text-slate-700">{{ service.name }}</h3>
                <span class="text-[11px] font-semibold text-[#3758F9]">{{ service.price }}</span>
              </div>
              <p class="mt-2 text-[10px] leading-4 text-slate-400">{{ service.description }}</p>
            </article>
          </div>
        </div>

        <div class="mt-5">
          <h2 class="text-sm font-semibold text-slate-500">Terms and Conditions</h2>
          <textarea
            class="mt-2.5 h-28 w-full resize-none rounded-md border border-slate-200 bg-slate-50 px-4 py-3 text-[10px] text-slate-400"
            [value]="termsText"
            readonly
          ></textarea>
        </div>

        <div class="mt-5 flex items-center justify-end gap-3">
          <button type="button" class="text-[11px] font-semibold text-slate-500">Cancel</button>
          <button
            type="button"
            class="flex items-center gap-2 rounded-md bg-slate-900 px-3 py-1.5 text-[11px] font-semibold text-white shadow-sm"
          >
            <span class="text-[11px]">✕</span>
            Unsubscribe
          </button>
          <button
            type="button"
            class="flex items-center gap-2 rounded-md bg-slate-900 px-4 py-1.5 text-[11px] font-semibold text-white shadow-sm"
          >
            <span class="text-[11px]">✓</span>
            Suscribe
          </button>
        </div>
      </div>
    </section>
  </main>
</div>
