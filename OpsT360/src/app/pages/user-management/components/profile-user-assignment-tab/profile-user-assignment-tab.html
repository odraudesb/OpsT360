<div class="space-y-5">
  <div>
    <p class="text-base font-semibold text-slate-900">Assign users to the different access profiles</p>
  </div>

  <div class="flex flex-wrap items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <label class="text-sm font-medium text-slate-700">Select profile</label>
      <div class="relative">
        <input type="text" [value]="selectedProfile" readonly
          class="w-60 rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 text-sm text-slate-700 outline-none focus:border-slate-300 focus:bg-white" />
        <span class="pointer-events-none absolute right-3 top-2.5 text-slate-500">
          <svg class="h-4 w-4" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </span>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <div class="flex items-center gap-3 rounded-full border border-slate-200 bg-slate-50 px-4 py-2 shadow-sm">
        <span class="flex h-9 w-9 items-center justify-center rounded-full border border-slate-200">
          <svg class="h-4 w-4 text-slate-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <path d="M4 6h16" />
            <path d="M4 12h16" />
            <path d="M4 18h16" />
          </svg>
        </span>
        <input type="search" placeholder="Search user" [(ngModel)]="searchTerm"
          class="w-full bg-transparent text-sm text-slate-700 placeholder:text-slate-400 outline-none" />
        <span class="text-slate-500">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7" />
            <path d="M20 20l-3.5-3.5" />
          </svg>
        </span>
      </div>
    </div>
  </div>

  <div class="space-y-6">
    <div class="grid grid-cols-1 gap-3 md:grid-cols-3 xl:grid-cols-4">
      <div *ngFor="let user of filteredUsers"
        class="flex items-center justify-between gap-3 rounded-lg border border-slate-200 bg-white px-4 py-3 shadow-sm">
        <div class="flex items-center gap-3">
          <div
            class="flex h-12 w-12 items-center justify-center rounded-full bg-slate-100 text-sm font-semibold text-slate-700">
            {{ user.initials }}
          </div>
          <div>
            <p class="text-sm font-semibold text-slate-900">{{ user.name }}</p>
            <p class="text-xs text-slate-500">{{ user.title }}</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="h-2.5 w-2.5 rounded-full" [ngClass]="user.online ? 'bg-green-500' : 'bg-slate-300'"
            aria-hidden="true"></span>
          <button class="text-slate-400 hover:text-slate-600" aria-label="Remove">
            <svg class="h-4 w-4" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
      </div>

      <button type="button"
        class="flex h-20 items-center justify-center rounded-lg border-2 border-dashed border-slate-200 text-slate-500 hover:border-slate-300 hover:text-slate-700">
        <svg class="h-6 w-6" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
          <path d="M12 5v14" />
          <path d="M5 12h14" />
        </svg>
      </button>
    </div>

    <div class="flex flex-wrap items-center justify-end gap-3">
      <button type="button" class="text-sm font-semibold text-slate-700 hover:text-slate-900">Cancel</button>
      <button type="button"
        class="inline-flex items-center gap-2 rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-slate-800">
        <svg class="h-4 w-4" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
          <rect x="5" y="4" width="14" height="16" rx="2" />
          <path d="M9 9h6v6H9z" />
        </svg>
        Save
      </button>
    </div>
  </div>
</div>
