<button *ngIf="show" class="fixed bottom-6 right-6 z-40 inline-flex h-12 w-12 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-700 shadow-lg ring-1 ring-slate-200 transition hover:-translate-y-0.5 hover:bg-slate-50"
  (click)="onClick()" aria-label="Back to top">
  <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <polyline points="6 9 12 3 18 9" />
    <line x1="12" y1="3" x2="12" y2="21" />
  </svg>
</button>
