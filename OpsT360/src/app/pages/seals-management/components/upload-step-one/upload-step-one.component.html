<div class="space-y-6">
  <p class="text-sm font-semibold text-[#3758F9]">STEP 1: Select file</p>
  <div class="rounded-md border border-slate-200 bg-slate-50 px-6 py-10 text-center">
    <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full border border-dashed border-slate-300 text-3xl text-slate-400">
      ⬆
    </div>
    <p class="mt-4 text-sm text-slate-700">Drag and drop your file here</p>
    <p class="text-sm text-slate-500">ó</p>
    <input #uploadInput type="file" class="hidden" accept=".csv,.xlsx,.xls" (change)="fileSelected.emit($event)" />
    <button type="button"
      class="mt-3 inline-flex items-center justify-center rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-black"
      (click)="uploadInput.click()">
      Select file
    </button>
    <p *ngIf="uploadFileName" class="mt-2 text-xs font-semibold text-slate-700">Selected: {{ uploadFileName }}</p>
    <p class="mt-3 text-xs text-slate-500">Supported formats: CSV, XLSX, XLS (Maximum 10 MB)</p>
  </div>

  <div class="grid gap-4 md:grid-cols-2">
    <label class="space-y-1 text-sm text-slate-700">
      <span>Purchase Order Id</span>
      <div class="relative">
        <select class="w-full appearance-none rounded-md border border-slate-300 px-3 py-2 text-sm"
          [ngModel]="purchaseOrderId" (ngModelChange)="purchaseOrderIdChange.emit($event)">
          <option value="">Select purchase order</option>
          <option *ngFor="let option of purchaseOrderOptions" [value]="option.id">
            {{ option.id }}{{ option.description ? ' - ' + option.description : '' }}
          </option>
        </select>
        <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
      </div>
    </label>
    <label class="space-y-1 text-sm text-slate-700">
      <span>Request Order Id</span>
      <input type="text" [ngModel]="requestOrderId" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
    </label>
    <label class="space-y-1 text-sm text-slate-700">
      <span>Requested Date</span>
      <div class="relative">
        <input type="text" [ngModel]="requestDate" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
        <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">⌄</span>
      </div>
    </label>
    <label class="space-y-1 text-sm text-slate-700">
      <span>Requester</span>
      <input type="text" [ngModel]="requester" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
    </label>
    <label class="space-y-1 text-sm text-slate-700">
      <span>Request Description</span>
      <input type="text" [ngModel]="requestDescription"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
    </label>
  </div>

  <label class="mt-2 flex items-center gap-2 text-sm text-slate-700">
    <input type="checkbox" class="h-4 w-4 rounded border-slate-300" [ngModel]="uploadHasHeaders"
      (ngModelChange)="uploadHasHeadersChange.emit($event)" />
    The file includes headers in the first row
  </label>

  <div class="flex justify-between">
    <button type="button"
      class="flex items-center gap-2 rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800"
      (click)="cancel.emit()">
      Cancel
    </button>
    <button type="button"
      class="flex items-center gap-2 rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-black"
      (click)="next.emit()">
      Next: Map Fields
    </button>
  </div>
</div>
