<section class="mt-6">
  <div class="flex items-center justify-end gap-2 text-sm text-slate-700" (click)="$event.stopPropagation()">
    <div class="relative flex items-center rounded-full border border-slate-200 bg-white px-3 py-2 shadow-sm">
      <button type="button"
        class="mr-2 flex items-center gap-2 rounded border border-transparent px-1 text-xs text-slate-500 hover:text-slate-700"
        aria-label="Open search filters" (click)="toggleFilterMenu($event)">
        <span class="text-slate-600">☰</span>
        <span class="text-[11px] font-medium text-slate-500">{{ filterLabel }}</span>
      </button>
      <input type="search" [ngModel]="searchTerm" (ngModelChange)="handleSearchChange($event)"
        placeholder="Search in list"
        class="w-60 bg-transparent text-xs text-slate-700 placeholder:text-slate-400 focus:outline-none" />

      <div *ngIf="showFilterMenu"
        class="absolute right-full top-full z-40 mr-2 mt-2 w-56 rounded-lg border border-slate-200 bg-white shadow-lg">
        <div class="flex items-center justify-between px-3 py-2">
          <span class="text-xs font-semibold text-slate-700">Search by</span>
          <button type="button" class="text-slate-400 hover:text-slate-700" aria-label="Close"
            (click)="closeFilterMenu($event)">
            ✕
          </button>
        </div>
        <div class="px-2 pb-2">
          <button type="button"
            class="flex w-full items-center justify-between rounded-md px-2 py-2 text-left text-xs text-slate-700 hover:bg-slate-50"
            [ngClass]="{ 'bg-slate-100 font-semibold': filterKey === 'id' }" (click)="setFilterKey('id')">
            <span>By Purchase Request Id</span>
            <span *ngIf="filterKey === 'id'" class="font-semibold text-[#3758F9]">✓</span>
          </button>
          <button type="button"
            class="flex w-full items-center justify-between rounded-md px-2 py-2 text-left text-xs text-slate-700 hover:bg-slate-50"
            [ngClass]="{ 'bg-slate-100 font-semibold': filterKey === 'requester' }"
            (click)="setFilterKey('requester')">
            <span>By Requester</span>
            <span *ngIf="filterKey === 'requester'" class="font-semibold text-[#3758F9]">✓</span>
          </button>
          <button type="button"
            class="flex w-full items-center justify-between rounded-md px-2 py-2 text-left text-xs text-slate-700 hover:bg-slate-50"
            [ngClass]="{ 'bg-slate-100 font-semibold': filterKey === 'status' }"
            (click)="setFilterKey('status')">
            <span>By Status</span>
            <span *ngIf="filterKey === 'status'" class="font-semibold text-[#3758F9]">✓</span>
          </button>
          <button type="button"
            class="mt-2 flex w-full items-center justify-between rounded-md px-2 py-2 text-left text-xs text-slate-700 hover:bg-slate-50"
            (click)="clearFilterKey($event)">
            <span>Clear selection</span>
            <span *ngIf="filterKey === 'all'" class="font-semibold text-slate-400">—</span>
          </button>
        </div>
      </div>
    </div>
    <button type="button" class="flex h-10 w-10 items-center justify-center text-slate-500 hover:text-slate-700"
      (click)="resetSearch($event)" aria-label="Reset search">
      <img src="assets/icons/reload.png" alt="" class="h-6 w-6 object-contain" />
    </button>
  </div>

  <div class="mt-6 overflow-hidden rounded-lg border border-slate-200 shadow-sm">
    <table class="min-w-full border-collapse border-t border-slate-200 text-sm">
      <thead class="border-b border-slate-200 text-[11px] tracking-wide text-[#757575]">
        <tr>
          <th class="px-4 py-3 text-left font-medium">P. request id</th>
          <th class="px-4 py-3 text-left font-medium">Description</th>
          <th class="px-4 py-3 text-left font-medium">Requester</th>
          <th class="px-4 py-3 text-left font-medium">Request date</th>
          <th class="px-4 py-3 text-left font-medium">Seal type</th>
          <th class="px-4 py-3 text-left font-medium">Total seals</th>
          <th class="px-4 py-3 text-left font-medium">Status</th>
          <th class="px-4 py-3 text-left font-medium">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-200/60">
        <tr *ngFor="let row of paginatedRows; trackBy: trackById" class="text-[#757575] hover:bg-slate-50/40">
          <td class="px-4 py-3 text-[#3758F9] underline">{{ row.id }}</td>
          <td class="px-4 py-3">{{ row.description }}</td>
          <td class="px-4 py-3">{{ row.requester }}</td>
          <td class="px-4 py-3">{{ row.date }}</td>
          <td class="px-4 py-3">{{ row.sealType }}</td>
          <td class="px-4 py-3">{{ row.total }}</td>
          <td class="px-4 py-3 text-slate-700">{{ row.status }}</td>
          <td class="px-4 py-3">
            <div *ngIf="!isFinalStatus(row.status); else noActions" class="flex items-center gap-2">
              <button type="button"
                class="flex items-center gap-1 rounded-full bg-emerald-500 px-3 py-1 text-xs font-semibold text-white shadow-sm hover:bg-emerald-600"
                (click)="approve.emit(row)">
                <img src="assets/icons/checkmark.png" alt="" class="h-3.5 w-3.5" />
                Approve
              </button>
              <button type="button"
                class="flex items-center gap-1 rounded-full bg-orange-500 px-3 py-1 text-xs font-semibold text-white shadow-sm hover:bg-orange-600"
                (click)="reject.emit(row)">
                <img src="assets/icons/hand.png" alt="" class="h-3.5 w-3.5" />
                Reject
              </button>
            </div>
            <ng-template #noActions>
              <span class="text-xs text-slate-400">—</span>
            </ng-template>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="filteredRows.length > 0"
      class="flex items-center justify-between px-4 py-3 text-xs text-slate-500">
      <span>Rows per page: {{ pageSize }}</span>
      <div class="flex items-center gap-3">
        <span>Page {{ currentPage }} of {{ totalPages }}</span>
        <button type="button" class="rounded border border-slate-200 px-2 py-1 text-xs disabled:opacity-40"
          (click)="previousPage()" [disabled]="currentPage === 1">
          ‹
        </button>
        <button type="button" class="rounded border border-slate-200 px-2 py-1 text-xs disabled:opacity-40"
          (click)="nextPage()" [disabled]="currentPage === totalPages">
          ›
        </button>
      </div>
    </div>
  </div>
</section>
