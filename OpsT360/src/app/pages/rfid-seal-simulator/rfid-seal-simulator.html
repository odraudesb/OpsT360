<t360-header sectionLabel="RFID Label Seals Simulator" sectionLink="" [disableSectionLink]="true"
  [showNotifications]="false" [showNotificationDot]="false"></t360-header>

<div class="min-h-screen bg-white">
  <div class="mx-auto w-full px-4 py-4 sm:px-5 lg:px-6">
    <!-- TITLE -->
    <section class="flex items-center gap-2.5 border-t border-slate-200 pt-3 text-slate-900">
      <img src="assets/icons/wifi-alt.png" alt="" class="h-5 w-5 object-contain" />
      <h1 class="text-lg font-extrabold tracking-[0.03em]">RFID LABEL SEAL PROCESS SIMULATION</h1>
    </section>

    <!-- STEPS -->
    <section class="mt-3 border-y border-slate-200 py-2">
      <div class="relative">
        <div class="absolute left-8 right-8 top-5 h-px bg-slate-200"></div>

        <div class="relative flex items-start justify-between">
          <div
            class="flex flex-col items-center gap-3 text-center"
            *ngFor="let step of steps"
            [ngClass]="canSelectStep(step.id) ? 'cursor-pointer' : 'cursor-not-allowed'"
            (click)="setActiveStep(step.id)"
          >
            <div class="flex h-11 w-11 items-center justify-center rounded-full text-sm font-bold"
              [ngClass]="step.id === activeStep ? 'bg-slate-900 text-white' : 'bg-slate-200 text-white'">
              {{ step.code }}
            </div>

            <div class="text-[10px] font-semibold uppercase tracking-[0.08em]"
              [ngClass]="step.id === activeStep ? 'text-slate-900' : 'text-slate-400'">
              <span class="block" *ngFor="let line of step.labelLines">{{ line }}</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- PRE GATE -->
    <section *ngIf="isPreGate" class="mt-3">
      <t360-pre-gate-step
        [containerId]="containerId"
        (containerIdChange)="onContainerIdChange($event)"
        [accessPanels]="accessPanels"
        [containerImage]="containerImage"
        [seals]="seals"
        [validationState]="validationState"
        [displayedProcessingMessages]="displayedProcessingMessages"
        [isDataCaptureComplete]="isDataCaptureComplete"
        [hasSeals]="hasSeals"
        [triggerFileInput]="triggerFileInput"
        [onEvidenceSelected]="onEvidenceSelected"
        [openPreview]="openPreview"
        [readSeals]="readSeals"
        [validate]="validate"
      ></t360-pre-gate-step>
    </section>

    <!-- NOT PRE GATE -->
    <section *ngIf="!isPreGate" class="mt-3">
      <t360-reading-step
        [containerId]="containerId"
        (containerIdChange)="onContainerIdChange($event)"
        [sectionLinkLabel]="sectionLinkLabel"
        [isGateIn]="isGateIn"
        [readFailures]="readFailures"
        [failureSelections]="failureSelections"
        [failureSealNumbers]="failureSealNumbers"
        [locationLabel]="locationLabel"
        [sealCards]="sealCards"
        [hasFailures]="hasFailures"
        [showResults]="hasReadingResults"
        [isProcessing]="isReadingProcessing"
        [canTriggerReading]="canTriggerReading"
        (triggerReading)="handleReadingAction()"
      ></t360-reading-step>
    </section>

    <!-- FOOTER -->
    <footer class="mt-12 flex items-center justify-end gap-5">
      <button type="button" class="text-xs font-semibold text-slate-900" (click)="cancel()">
        {{ cancelButtonLabel }}
      </button>

      <button type="button"
        class="inline-flex h-9 items-center justify-center gap-3 rounded-md bg-slate-900 px-5 text-xs font-semibold text-white disabled:bg-slate-300 disabled:text-slate-500"
        [disabled]="!canProceedNext" (click)="goToNextStep()">
        <span class="inline-flex h-5 w-5 items-center justify-center rounded-md border border-white/20">
          <svg viewBox="0 0 24 24" aria-hidden="true" class="h-3.5 w-3.5 fill-white">
            <path d="M10 17l5-5-5-5v10z" />
          </svg>
        </span>
        {{ nextButtonLabel }}
      </button>
    </footer>
  </div>

  <!-- MODAL PREVIEW -->
  <div class="fixed inset-0 z-20 flex items-center justify-center bg-slate-900/60 p-6" *ngIf="previewImageUrl"
    (click)="closePreview()">
    <div
      class="grid w-full max-w-3xl gap-3 rounded-lg bg-white p-4 sm:p-6 max-h-[85vh] overflow-hidden"
      (click)="$event.stopPropagation()"
    >
      <button type="button" class="justify-self-end text-lg text-slate-400" (click)="closePreview()">✕</button>
      <p class="flex items-center gap-2 text-sm font-medium text-slate-700">
        <span>{{ previewImageLabel }}</span>
        <span
          *ngIf="previewImageStatus === 'success'"
          class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-emerald-100 text-xs font-semibold text-emerald-700"
          aria-label="Validation successful"
          title="Validation successful"
        >
          ✓
        </span>
        <span
          *ngIf="previewImageStatus === 'failed'"
          class="inline-flex h-5 w-5 items-center justify-center rounded-full bg-rose-100 text-xs font-semibold text-rose-700"
          aria-label="Validation failed"
          title="Validation failed"
        >
          ✕
        </span>
      </p>
      <div class="flex items-center justify-end gap-2">
        <button
          type="button"
          class="inline-flex h-7 w-7 items-center justify-center rounded-md border border-slate-200 text-slate-600"
          (click)="decreasePreviewZoom()"
        >
          −
        </button>
        <span class="text-xs font-semibold text-slate-500">{{ (previewZoom * 100) | number: '1.0-0' }}%</span>
        <button
          type="button"
          class="inline-flex h-7 w-7 items-center justify-center rounded-md border border-slate-200 text-slate-600"
          (click)="increasePreviewZoom()"
        >
          +
        </button>
      </div>
      <div class="overflow-auto max-h-[70vh]" (wheel)="handlePreviewWheel($event)">
        <img
          [src]="previewImageUrl"
          [alt]="previewImageLabel || 'Preview'"
          class="mx-auto rounded-md object-contain origin-top"
          [style.transform]="'scale(' + previewZoom + ')'"
        />
      </div>
    </div>
  </div>
</div>
