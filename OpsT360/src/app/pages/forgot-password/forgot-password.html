<div class="relative flex min-h-screen items-center justify-center overflow-hidden">
  <!-- background -->
  <div
    class="absolute inset-0 -z-20 bg-slate-900 bg-cover bg-center"
    [ngStyle]="{ 'background-image': 'url(' + background + ')' }"
  ></div>

  <!-- tint -->
  <div class="absolute inset-0 -z-10 bg-white/80"></div>

  <!-- top left -->
  <header class="absolute inset-x-0 top-0 z-20 flex items-center justify-between px-6 py-4">
    <div class="flex items-center gap-2">
      <img [src]="icono" alt="T360 icon" class="h-8 w-auto" />
      <span class="text-base font-semibold text-white">T360°</span>
      <span class="ml-2 text-sm font-medium text-white/80" i18n>I forgot my Password</span>
    </div>

    <span class="text-sm font-medium text-white/80">Trace360° Web</span>
  </header>

  <!-- card -->
  <main class="relative z-20 w-full max-w-md px-4">
    <t360-forgot-password-email
      *ngIf="step === 'email'"
      [isSubmitting]="isSubmitting"
      (submitEmail)="handleEmail($event)"
      (back)="backFromEmail()"
    ></t360-forgot-password-email>

    <t360-forgot-password-code
      *ngIf="step === 'code'"
      [isSubmitting]="isSubmitting"
      (submitCode)="handleCode($event)"
      (back)="backFromCode()"
    ></t360-forgot-password-code>

    <t360-forgot-password-new-password
      *ngIf="step === 'newPassword'"
      [isSubmitting]="isSubmitting"
      (submitPassword)="handleNewPassword($event)"
      (back)="backFromNewPassword()"
    ></t360-forgot-password-new-password>
  </main>
</div>
